name: Deploy to GitHub Pages

# Deploys interactive 3D HTML charts to GitHub Pages.
#
# Custom domain: kpango.com (proxied via Cloudflare)
#
# Required Cloudflare DNS configuration:
#   Type: CNAME
#   Name: kpango.com  (or @ for root)
#   Target: kpango.github.io
#   Proxy status: Proxied (orange cloud)
#   SSL/TLS mode: Full
#
# Required GitHub Pages settings (repo → Settings → Pages):
#   Source: GitHub Actions
#   Custom domain: kpango.com

on:
  push:
    branches: [main]
    paths:
      - "images/*.html"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: images
      - id: deployment
        uses: actions/deploy-pages@v4
